{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Essenciais - Finanças UFC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root {
            --bg-light: #f8f9fa;
            --bg-dark: #121212;
            --card-light: #ffffff;
            --card-dark: #1e1e1e;
            --text-light: #212529;
            --text-dark: #e0e0e0;
            --accent: #0d6efd;
        }

        body { 
            transition: background-color 0.3s ease, color 0.3s ease;
            background-color: var(--bg-light);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
        }

        [data-bs-theme="dark"] body {
            background-color: var(--bg-dark) !important;
            color: var(--text-dark) !important;
        }

        /* Estilo dos Cards de Links */
        .custom-card {
            background-color: var(--card-light);
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        [data-bs-theme="dark"] .custom-card {
            background-color: var(--card-dark) !important;
            border: 1px solid #333 !important;
        }

        .custom-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important;
        }

        /* Botão de Tema Moderno */
        .theme-toggle {
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            border: 1px solid #ddd;
            background: var(--card-light);
            transition: all 0.3s;
        }

        [data-bs-theme="dark"] .theme-toggle {
            background: #2d2d2d; border-color: #444; color: #ffca28;
        }

        /* Ajustes de Cores para o Dark Mode */
        [data-bs-theme="dark"] .text-primary { color: #60a5fa !important; }
        [data-bs-theme="dark"] .btn-primary { 
            background-color: #0d6efd; 
            border-color: #0d6efd; 
        }
        [data-bs-theme="dark"] .text-muted { color: #9ba3af !important; }
    </style>
</head>
<body class="bg-body-tertiary">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                <i class="fas fa-arrow-left me-2"></i>Voltar
            </a>
            <h2 class="fw-bold m-0 text-center">Links Essenciais UFC</h2>
            <div class="theme-toggle shadow-sm" id="btnTema">
                <i class="fas fa-moon" id="iconTema"></i>
            </div>
        </div>

        <div class="row g-4">
            {% for link in links %}
            <div class="col-md-6 col-lg-4 text-center">
                <div class="card h-100 shadow-sm border-0 custom-card py-4">
                    <div class="card-body">
                        <div class="mb-3">
                            <i class="{{ link.icone }} fa-4x text-primary"></i>
                        </div>
                        <h5 class="card-title fw-bold mb-2">{{ link.nome }}</h5>
                        <p class="card-text text-muted small mb-4 px-2">{{ link.descricao }}</p>
                        <a href="{{ link.url }}" target="_blank" class="btn btn-primary rounded-pill w-100 py-2 shadow-sm">
                            <i class="fas fa-external-link-alt me-2"></i>Acessar Portal
                        </a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center py-5 opacity-50">
                <i class="fas fa-link-slash fa-4x mb-3"></i>
                <p>Nenhum link foi cadastrado no sistema ainda.</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        const btnTema = document.getElementById('btnTema');
        const iconTema = document.getElementById('iconTema');
        const htmlElement = document.documentElement;

        const atualizarInterface = (tema) => {
            htmlElement.setAttribute('data-bs-theme', tema);
            localStorage.setItem('theme', tema);
            
            if (tema === 'dark') {
                iconTema.classList.replace('fa-moon', 'fa-sun');
                iconTema.style.color = '#ffca28';
            } else {
                iconTema.classList.replace('fa-sun', 'fa-moon');
                iconTema.style.color = '#212529';
            }
        };

        const temaSalvo = localStorage.getItem('theme') || 'light';
        atualizarInterface(temaSalvo);

        btnTema.addEventListener('click', () => {
            const novoTema = htmlElement.getAttribute('data-bs-theme') === 'light' ? 'dark' : 'light';
            atualizarInterface(novoTema);
        });
    </script>
</body>
</html>
